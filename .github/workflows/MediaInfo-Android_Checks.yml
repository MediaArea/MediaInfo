name: MediaInfo-Android Checks

on:
  push:
    paths:
      - '.github/workflows/MediaInfo-Android_Checks.yml'
      - 'Source/GUI/Android/**'

  pull_request:
    paths:
      - '.github/workflows/MediaInfo-Android_Checks.yml'
      - 'Source/GUI/Android/**'

env:
  JAVA_VER: 21

jobs:

  Ubuntu:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout brotli
        uses: actions/checkout@v6
        with:
          repository: cjee21/brotli #!! TO CHANGE !!
          ref: MSVC                 #!! TO REMOVE !!
          path: brotli
      - name: Checkout zlib
        uses: actions/checkout@v6
        with:
          repository: MediaArea/zlib
          path: zlib
      - name: Checkout ZenLib
        uses: actions/checkout@v6
        with:
          repository: MediaArea/ZenLib
          path: ZenLib
      - name: Checkout MediaInfoLib
        uses: actions/checkout@v6
        with:
          repository: cjee21/MediaInfoLib  #!! TO CHANGE !!
          ref: jxl                         #!! TO REMOVE !!
          path: MediaInfoLib
      - name: Checkout MediaInfo
        uses: actions/checkout@v6
        with:
          path: MediaInfo
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'jetbrains'
          java-version: ${{ env.JAVA_VER }}
      - name: Build APKs
        run: |
          pushd ${{ github.workspace }}/MediaInfo/Source/GUI/Android
          chmod +x gradlew
          ./gradlew assembleRelease --warning-mode fail
          popd
